var cur = 0;
function render() {
  document.getElementById('slide-inner').innerHTML = slides[cur][1];
  document.getElementById('counter').textContent = (cur+1) + ' of ' + slides.length + ' · chapter2.agency';
  document.getElementById('prev').disabled = cur === 0;
  var nb = document.getElementById('next');
  nb.disabled = cur === slides.length - 1;
  nb.className = cur === slides.length - 1 ? 'btn' : 'btnn';
  var d = document.getElementById('dots');
  d.innerHTML = '';
  for (var i = 0; i < slides.length; i++) {
    var b = document.createElement('button');
    b.className = 'dot ' + (i === cur ? 'don' : 'dof');
    b.setAttribute('onclick', 'jump(' + i + ')');
    d.appendChild(b);
  }
}
function go(n) { cur = Math.max(0, Math.min(slides.length - 1, cur + n)); render(); }
function jump(i) { cur = i; render(); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});
render();
})();
</script>
